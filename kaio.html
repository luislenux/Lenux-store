<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Caçada de Kaio 3D</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}


#menu{

position:absolute;
z-index:10;

width:100%;
height:100%;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:#000b;

font-family:Arial;
color:white;

}


button{

padding:15px;
margin:10px;

width:250px;

border:0;
border-radius:15px;

background:#3ddc84;

font-size:18px;

}


#hud{

position:absolute;
top:10px;
left:10px;

color:white;

background:#0008;

padding:10px;

display:none;

font-family:Arial;

}


</style>

</head>


<body>


<div id="menu">

<h1>
👶 A Caçada de Kaio 3D
</h1>


<button onclick="iniciarJogo()">
Jogar
</button>


</div>


<div id="hud">

Personagem:
<span id="player">
Pai
</span>

<br>

Missão:
<span id="missao">
Salvar Arthur
</span>

</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>


<script>


let cena;
let camera;
let renderizador;

let teclas={};


let velocidade=0.15;



function iniciarJogo(){


document.getElementById("menu").style.display="none";

document.getElementById("hud").style.display="block";


criarMundo();


}



function criarMundo(){


cena = new THREE.Scene();


cena.background =
new THREE.Color(0x87ceeb);



camera =
new THREE.PerspectiveCamera(

75,

window.innerWidth/window.innerHeight,

0.1,

1000

);



camera.position.set(
0,
1.6,
5
);



renderizador =
new THREE.WebGLRenderer();



renderizador.setSize(

window.innerWidth,

window.innerHeight

);



document.body.appendChild(
renderizador.domElement
);




let luz =
new THREE.DirectionalLight(
0xffffff,
1
);


luz.position.set(
5,
10,
5
);


cena.add(luz);



let chao =
new THREE.Mesh(

new THREE.BoxGeometry(
30,
0.2,
30
),

new THREE.MeshBasicMaterial({
color:0x3f9b3f
})

);



chao.position.y=-0.1;


cena.add(chao);




let casa =
new THREE.Mesh(

new THREE.BoxGeometry(
6,
3,
6
),

new THREE.MeshBasicMaterial({
color:0xc9a66b
})

);



casa.position.set(
0,
1.5,
-8
);



cena.add(casa);



animar();


}




function animar(){


requestAnimationFrame(animar);


movimento();


renderizador.render(
cena,
camera
);


}



function movimento(){


if(teclas["w"])
camera.position.z-=velocidade;


if(teclas["s"])
camera.position.z+=velocidade;


if(teclas["a"])
camera.position.x-=velocidade;


if(teclas["d"])
camera.position.x+=velocidade;


}



document.addEventListener(
"keydown",
e=>{

teclas[e.key.toLowerCase()]=true;

}
);



document.addEventListener(
"keyup",
e=>{

teclas[e.key.toLowerCase()]=false;

}
);



</script>


</body>

</html>
