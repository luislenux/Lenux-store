<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Caçada de Kaio</title>

<style>

body{

margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
color:white;

}


#menu{

position:absolute;
width:100%;
height:100%;

background:rgba(0,0,0,.85);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

z-index:10;

}


h1{

color:#3ddc84;
font-size:40px;

}


button{

width:260px;
padding:15px;
margin:8px;

border:none;
border-radius:15px;

background:#3ddc84;

font-size:18px;
font-weight:bold;

cursor:pointer;

}



#jogo{

display:none;

width:100vw;
height:100vh;

background:#65b84b;

position:relative;

}



#mapa{

position:absolute;

width:100%;
height:100%;

}



.local{

position:absolute;

border:3px solid #000;

background:#c9a66b;

display:flex;

align-items:center;

justify-content:center;

font-size:20px;

color:black;

}



#casa{

width:500px;
height:350px;

left:200px;
top:150px;

}



#jardim{

width:250px;
height:250px;

right:50px;
top:250px;

background:#3f9b3f;

}



#arvore{

width:80px;
height:160px;

right:120px;
top:80px;

background:#8b4513;

color:white;

}



#hud{

position:absolute;

top:10px;
left:10px;

background:#000a;

padding:15px;

border-radius:10px;

display:none;

}


</style>

</head>


<body>


<div id="menu">


<h1>
👶 A Caçada de Kaio
</h1>


<button onclick="modoHistoria()">

📖 Modo História

</button>


<button onclick="modoTerror()">

👹 Modo Terror

</button>


<button onclick="entrarMultiplayer()">

🌐 Multiplayer

</button>


</div>



<div id="jogo">


<div id="mapa">


<div class="local" id="casa">

🏠 Casa Principal

</div>



<div class="local" id="jardim">

🌳 Jardim da Vó

</div>



<div class="local" id="arvore">

🌲 Árvore

</div>


</div>



<div id="hud">

Personagem:
<span id="personagem">

---

</span>

<br>

Missão:
<span id="missao">

Começar

</span>

</div>


</div>



<script>


let modo="";

let personagem="";



function iniciar(){

document.getElementById("menu").style.display="none";

document.getElementById("jogo").style.display="block";

document.getElementById("hud").style.display="block";

}



function modoHistoria(){

modo="historia";

personagem="Pai";

iniciar();


document.getElementById("personagem").innerHTML=
"Pai 👨";


document.getElementById("missao").innerHTML=
"Salve Arthur no porão";


}



function modoTerror(){

modo="terror";

personagem="Kaio";

iniciar();


document.getElementById("personagem").innerHTML=
"Kaio 👶";


document.getElementById("missao").innerHTML=
"Cace os jogadores";


}



function entrarMultiplayer(){

alert(
"Multiplayer será conectado pelo Socket.io"
);

}



</script>


</body>

</html>
