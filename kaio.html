<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Caçada de Kaio 3D</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}


canvas{
display:block;
}


#joystick{

position:absolute;

bottom:40px;
left:40px;

width:120px;
height:120px;

border-radius:50%;

background:#ffffff33;

}


#bola{

position:absolute;

width:50px;
height:50px;

border-radius:50%;

background:#3ddc84;

left:35px;
top:35px;

}



#botao{

position:absolute;

right:40px;
bottom:50px;

width:80px;
height:80px;

border-radius:50%;

background:#3ddc84;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;

}


#menu{

position:absolute;

width:100%;
height:100%;

background:#000b;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

color:white;

font-family:Arial;

z-index:10;

}


button{

padding:15px;

width:250px;

background:#3ddc84;

border:0;

border-radius:15px;

font-size:18px;

}


</style>

</head>


<body>



<div id="menu">

<h1>
👶 A Caçada de Kaio
</h1>


<button onclick="jogar()">

Jogar

</button>


</div>



<div id="joystick">

<div id="bola"></div>

</div>


<div id="botao">

AÇÃO

</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>


<script>


let cena;

let camera;

let renderer;


let andando=false;

let direcao={
x:0,
y:0
};



function jogar(){

document.getElementById("menu").style.display="none";

iniciar3D();

}



function iniciar3D(){


cena=new THREE.Scene();


cena.background =
new THREE.Color(0x87ceeb);



camera=new THREE.PerspectiveCamera(

75,

innerWidth/innerHeight,

0.1,

1000

);



camera.position.set(
0,
1.6,
5
);



renderer=new THREE.WebGLRenderer();


renderer.setSize(
innerWidth,
innerHeight
);


document.body.appendChild(
renderer.domElement
);



let luz =
new THREE.HemisphereLight(
0xffffff,
0x444444,
2
);


cena.add(luz);




let chao =
new THREE.Mesh(

new THREE.BoxGeometry(
40,
0.2,
40
),

new THREE.MeshBasicMaterial({

color:0x3f9b3f

})

);


chao.position.y=-0.1;


cena.add(chao);




let casa =
new THREE.Mesh(

new THREE.BoxGeometry(
8,
4,
8
),

new THREE.MeshBasicMaterial({

color:0xc9a66b

})

);



casa.position.z=-10;

casa.position.y=2;


cena.add(casa);



loop();


}



function loop(){


requestAnimationFrame(loop);



camera.position.x += direcao.x *0.08;

camera.position.z += direcao.y *0.08;



renderer.render(
cena,
camera
);


}




let joy=document.getElementById("joystick");

let bola=document.getElementById("bola");



joy.addEventListener(
"touchmove",
function(e){


let toque=e.touches[0];


let rect=joy.getBoundingClientRect();


let x=toque.clientX-rect.left-60;

let y=toque.clientY-rect.top-60;



let distancia=Math.sqrt(
x*x+y*y
);



if(distancia>45){

x=x/distancia*45;

y=y/distancia*45;

}



bola.style.left=(x+35)+"px";

bola.style.top=(y+35)+"px";



direcao.x=x/45;

direcao.y=y/45;



}
);



joy.addEventListener(
"touchend",
function(){

bola.style.left="35px";

bola.style.top="35px";


direcao.x=0;

direcao.y=0;


}
);



</script>


</body>

</html>
