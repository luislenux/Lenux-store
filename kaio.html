<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Caçada de Kaio</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            font-family: Arial, sans-serif;
            color: white;
        }

        #menu {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        h1 {
            color: #3ddc84;
        }

        p {
            width: 80%;
            text-align: center;
        }

        button {
            width: 250px;
            padding: 15px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            background: #3ddc84;
            color: black;
            font-size: 18px;
        }

        #codigoSala {
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
        }

        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            display: none;
            z-index: 50;
        }
    </style>
</head>

<body>

<div id="menu">

    <h1>👶 A Caçada de Kaio</h1>

    <p>
        Kaio, um bebê de fralda, nasceu e quer brincar com
        seus amigos e familiares...
    </p>

    <button onclick="iniciarHistoria()">
        📖 História Online
    </button>

    <button onclick="abrirMultiplayer()">
        🌐 Multiplayer (Kaio jogável)
    </button>

    <button onclick="criarSala()">
        ➕ Criar Sala
    </button>

    <input
        id="codigoSala"
        placeholder="Digite o código da sala">

    <button onclick="entrarSala()">
        🔑 Entrar na Sala
    </button>

</div>

<div id="hud">
    Sala:
    <span id="salaAtual">---</span>
</div>

<script>

let sala = null;

function gerarCodigo() {

    const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    return (
        letras[Math.floor(Math.random() * letras.length)] +
        letras[Math.floor(Math.random() * letras.length)] +
        "-" +
        Math.floor(1000 + Math.random() * 9000)
    );
}

function criarSala() {

    sala = gerarCodigo();

    document.getElementById("salaAtual").innerText = sala;

    alert(
        "Sala criada!\n\nCódigo:\n" + sala
    );
}

function entrarSala() {

    const codigo = document
        .getElementById("codigoSala")
        .value
        .trim()
        .toUpperCase();

    if (!codigo) {

        alert("Digite um código.");

        return;
    }

    sala = codigo;

    document.getElementById("salaAtual").innerText = sala;

    alert(
        "Você entrou na sala " + sala
    );
}

function iniciarHistoria() {

    document.getElementById("menu").style.display = "none";

    document.getElementById("hud").style.display = "block";

    alert(
        "Salve Luis, Arthur e Taylon antes que Kaio fique furioso!"
    );
}

function abrirMultiplayer() {

    alert(
        "O modo multiplayer será conectado ao servidor da Render."
    );
}

</script>

</body>
</html>
